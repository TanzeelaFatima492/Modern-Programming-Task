<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management - ProPanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1e;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
        }

        .main-content {
            margin-top: 80px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .top-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-title h1 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-header h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
            font-weight: 600;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 22px;
            color: #a9b4ff;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
        }

        .search-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .search-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
        }

        .admins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .admin-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-card:hover {
            transform: translateY(-8px);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            padding: 30px;
            text-align: center;
        }

        .admin-avatar img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .role-badge {
            display: inline-block;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.8em;
        }

        .card-body {
            padding: 25px;
        }

        .admin-name {
            font-size: 1.3em;
            font-weight: 800;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .admin-info i {
            width: 24px;
            color: #a9b4ff;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.8);
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.8);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            width: 500px;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close {
            cursor: pointer;
            font-size: 1.8em;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
        }

        .modal-footer {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            z-index: 2100;
            color: white;
        }

        .toast.success {
            border-left: 4px solid #4ade80;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .admins-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <div class="logo-text">
                    <h1>ProPanel</h1>
                    <p>Enterprise Suite</p>
                </div>
            </div>
            <div class="nav-links"><a href="/">Home</a><a href="/customers">Customers</a><a href="/admins"
                    class="active">Admins</a></div>
        </div>
    </nav>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Administrator Management</h1>
                <p>Manage admins - Changes are saved to MongoDB</p>
            </div><button class="btn-add" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Admin</button>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="search-section">
            <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" id="searchInput"
                    placeholder="Search admins..." onkeyup="searchAdmins()"></div>
        </div>
        <div id="adminsGrid" class="admins-grid">
            <div style="text-align:center;padding:60px;color:white;">Loading admins from MongoDB...</div>
        </div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Admin</h2><span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Full Name *</label><input type="text" id="adminName"
                        placeholder="Enter full name"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="adminEmail"
                        placeholder="admin@example.com"></div>
                <div class="form-group"><label>Role</label><select id="adminRole">
                        <option value="Super Admin">Super Admin</option>
                        <option value="Admin">Admin</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Viewer">Viewer</option>
                    </select></div>
                <div class="form-group"><label>Phone</label><input type="text" id="adminPhone"
                        placeholder="+1 (555) 123-4567"></div>
                <div class="form-group"><label>Department</label><input type="text" id="adminDepartment"
                        placeholder="IT, Sales, Support"></div>
            </div>
            <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button
                    class="btn-save" onclick="saveAdmin()">Save to MongoDB</button></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        let allAdmins = [];
        let currentEditId = null;

        async function loadAdmins() {
            try {
                const response = await fetch('/api/admins');
                const data = await response.json();
                if (data.success) {
                    allAdmins = data.data;
                    updateStats();
                    displayAdmins();
                    showToast(`Loaded ${allAdmins.length} admins from MongoDB`, 'success');
                }
            } catch (error) {
                showToast('Error loading admins', 'error');
            }
        }

        function updateStats() {
            const total = allAdmins.length;
            const superAdmins = allAdmins.filter(a => a.role === 'Super Admin').length;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-header"><h4>Total Admins</h4><div class="stat-icon"><i class="fas fa-user-shield"></i></div></div><div class="stat-number">${total}</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Super Admins</h4><div class="stat-icon"><i class="fas fa-crown"></i></div></div><div class="stat-number">${superAdmins}</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Active</h4><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div><div class="stat-number">${total}</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Departments</h4><div class="stat-icon"><i class="fas fa-building"></i></div></div><div class="stat-number">${new Set(allAdmins.map(a => a.department)).size}</div></div>
            `;
        }

        function displayAdmins() {
            const grid = document.getElementById('adminsGrid');
            let filtered = [...allAdmins];
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) filtered = filtered.filter(a => a.name.toLowerCase().includes(search) || a.email.toLowerCase().includes(search));
            if (filtered.length === 0) { grid.innerHTML = '<div style="text-align:center;padding:80px;color:white;">No admins found</div>'; return; }
            grid.innerHTML = filtered.map(admin => `<div class="admin-card"><div class="card-header"><div class="admin-avatar"><img src="https://ui-avatars.com/api/?name=${admin.name}&background=667eea&color=fff&size=100"></div><div class="role-badge">${admin.role}</div></div><div class="card-body"><div class="admin-name">${admin.name}</div><div class="admin-info"><i class="fas fa-envelope"></i> ${admin.email}</div><div class="admin-info"><i class="fas fa-phone"></i> ${admin.phone || 'Not provided'}</div><div class="admin-info"><i class="fas fa-building"></i> ${admin.department || 'Not specified'}</div></div><div class="card-actions"><button class="btn-edit" onclick="editAdmin('${admin.adminId}')"><i class="fas fa-edit"></i> Edit</button><button class="btn-delete" onclick="deleteAdmin('${admin.adminId}')"><i class="fas fa-trash"></i> Delete</button></div></div>`).join('');
        }

        function searchAdmins() { displayAdmins(); }
        function generateAdminId() { return `ADMIN${String(Date.now()).slice(-6)}`; }
        function showAddModal() { currentEditId = null; document.getElementById('modalTitle').innerHTML = 'Add New Admin'; document.getElementById('adminName').value = ''; document.getElementById('adminEmail').value = ''; document.getElementById('adminRole').value = 'Admin'; document.getElementById('adminPhone').value = ''; document.getElementById('adminDepartment').value = ''; document.getElementById('modal').style.display = 'flex'; }
        async function editAdmin(adminId) { try { const res = await fetch(`/api/admins/${adminId}`); const data = await res.json(); if (data.success) { currentEditId = adminId; document.getElementById('modalTitle').innerHTML = 'Edit Admin'; document.getElementById('adminName').value = data.data.name; document.getElementById('adminEmail').value = data.data.email; document.getElementById('adminRole').value = data.data.role; document.getElementById('adminPhone').value = data.data.phone || ''; document.getElementById('adminDepartment').value = data.data.department || ''; document.getElementById('modal').style.display = 'flex'; } } catch (e) { showToast('Error loading admin', 'error'); } }
        async function saveAdmin() { const name = document.getElementById('adminName').value.trim(); const email = document.getElementById('adminEmail').value.trim(); if (!name || !email) { showToast('Please fill required fields', 'error'); return; } const adminData = { adminId: currentEditId || generateAdminId(), name, email, role: document.getElementById('adminRole').value, phone: document.getElementById('adminPhone').value, department: document.getElementById('adminDepartment').value, joinDate: new Date().toISOString().split('T')[0], lastActive: new Date().toISOString().split('T')[0], status: 'Active' }; try { let response; if (currentEditId) response = await fetch(`/api/admins/${currentEditId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(adminData) }); else response = await fetch('/api/admins', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(adminData) }); const result = await response.json(); if (result.success) { showToast(currentEditId ? 'Admin updated in MongoDB!' : 'Admin added to MongoDB!', 'success'); closeModal(); loadAdmins(); } else showToast(result.error, 'error'); } catch (e) { showToast('Error saving to MongoDB', 'error'); } }
        async function deleteAdmin(adminId) { if (confirm('Delete this admin from MongoDB?')) { try { const res = await fetch(`/api/admins/${adminId}`, { method: 'DELETE' }); if ((await res.json()).success) { showToast('Admin deleted from MongoDB!', 'success'); loadAdmins(); } } catch (e) { showToast('Error deleting', 'error'); } } }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showToast(msg, type) { const toast = document.getElementById('toast'); toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`; toast.className = `toast ${type}`; toast.style.display = 'flex'; setTimeout(() => toast.style.display = 'none', 3000); }
        window.onclick = e => { if (e.target === document.getElementById('modal')) closeModal(); };
        loadAdmins();
    </script>
</body>

</html>
