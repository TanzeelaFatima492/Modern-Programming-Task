<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management - ProPanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1e;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-title h1 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-header h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 22px;
            color: #a9b4ff;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 0.8em;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Search Section */
        .search-section {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .search-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.95em;
            color: white;
            transition: all 0.3s;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Admins Grid */
        .admins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .admin-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-card:hover {
            transform: translateY(-8px);
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .admin-avatar {
            position: relative;
            display: inline-block;
        }

        .admin-avatar img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s;
        }

        .admin-card:hover .admin-avatar img {
            transform: scale(1.05);
        }

        .role-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7em;
            font-weight: 600;
            color: white;
        }

        .card-body {
            padding: 25px;
        }

        .admin-name {
            font-size: 1.3em;
            font-weight: 800;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .admin-info i {
            width: 24px;
            color: #a9b4ff;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.1em;
            font-weight: 800;
            color: #a9b4ff;
        }

        .stat-label {
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.8);
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.8);
            color: white;
        }

        .btn-edit:hover,
        .btn-delete:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            width: 500px;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.5em;
            font-weight: 700;
        }

        .close {
            cursor: pointer;
            font-size: 1.8em;
            transition: all 0.3s;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: white;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.95em;
            color: white;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .modal-footer {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save:hover,
        .btn-cancel:hover {
            transform: translateY(-2px);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 2100;
            border-left: 4px solid;
            color: white;
        }

        .toast.success {
            border-left-color: #4ade80;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .admins-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 1rem;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="logo-text">
                    <h1>ProPanel</h1>
                    <p>Enterprise Suite</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/customers">Customers</a>
                <a href="/admins" class="active">Admins</a>
               
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Administrator Management</h1>
                <p>Manage system administrators and their permissions</p>
            </div>
            <div class="action-buttons">
                <button class="btn-add" onclick="showAddModal()">
                    <i class="fas fa-plus"></i> Add Admin
                </button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-header">
                    <h4>Total Admins</h4>
                    <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
                </div>
                <div class="stat-number" id="totalAdmins">-</div>
                <div class="stat-change"><i class="fas fa-users"></i> Active team</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <h4>Super Admins</h4>
                    <div class="stat-icon"><i class="fas fa-crown"></i></div>
                </div>
                <div class="stat-number" id="superAdmins">-</div>
                <div class="stat-change"><i class="fas fa-star"></i> Full access</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <h4>Moderators</h4>
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                </div>
                <div class="stat-number" id="moderators">-</div>
                <div class="stat-change"><i class="fas fa-chart-line"></i> Support team</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <h4>Total Managed</h4>
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                </div>
                <div class="stat-number" id="managedCustomers">-</div>
                <div class="stat-change"><i class="fas fa-arrow-up"></i> Customers</div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, email, or role..."
                    onkeyup="searchAdmins()">
            </div>
        </div>

        <div id="adminsGrid" class="admins-grid">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading administrators...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Administrator</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="adminName" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>Role *</label>
                    <select id="adminRole">
                        <option value="Super Admin">Super Admin</option>
                        <option value="Admin">Admin</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Viewer">Viewer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="adminPhone" placeholder="+1 (555) 123-4567">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="adminDepartment" placeholder="IT, Sales, Support, etc.">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveAdmin()">Save Admin</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let allAdmins = [];
        let currentEditId = null;

        // Load admins from MongoDB
        async function loadAdmins() {
            try {
                const response = await fetch('/api/admins');
                const data = await response.json();
                if (data.success) {
                    allAdmins = data.data;
                    updateStats();
                    displayAdmins();
                    showToast('Admins loaded from database!', 'success');
                } else {
                    showToast('Failed to load admins', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to load admins', 'error');
            }
        }

        // Update statistics
        function updateStats() {
            const total = allAdmins.length;
            const superAdmins = allAdmins.filter(a => a.role === 'Super Admin').length;
            const moderators = allAdmins.filter(a => a.role === 'Moderator').length;
            const totalManaged = allAdmins.reduce((sum, a) => sum + (a.managedCustomers || 0), 0);

            document.getElementById('totalAdmins').textContent = total;
            document.getElementById('superAdmins').textContent = superAdmins;
            document.getElementById('moderators').textContent = moderators;
            document.getElementById('managedCustomers').textContent = totalManaged;
        }

        // Display admins
        function displayAdmins() {
            const grid = document.getElementById('adminsGrid');
            if (allAdmins.length === 0) {
                grid.innerHTML = `<div style="text-align:center;padding:80px;background:rgba(0,0,0,0.6);border-radius:20px;"><i class="fas fa-user-shield" style="font-size:4em;color:#4ade80;"></i><h3 style="margin-top:20px;color:white;">No administrators found</h3><button class="btn-add" style="margin-top:20px;" onclick="showAddModal()">Add Admin</button></div>`;
                return;
            }

            grid.innerHTML = allAdmins.map(admin => `
                <div class="admin-card">
                    <div class="card-header">
                        <div class="admin-avatar">
                            <img src="https://ui-avatars.com/api/?name=${admin.name}&background=667eea&color=fff&bold=true&size=100" alt="Avatar">
                            <div class="role-badge">${admin.role}</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="admin-name">${admin.name}</div>
                        <div class="admin-info"><i class="fas fa-envelope"></i> ${admin.email}</div>
                        <div class="admin-info"><i class="fas fa-phone"></i> ${admin.phone || 'Not provided'}</div>
                        <div class="admin-info"><i class="fas fa-building"></i> ${admin.department || 'Not specified'}</div>
                        <div class="stats-row">
                            <div class="stat"><div class="stat-value">${admin.managedCustomers || 0}</div><div class="stat-label">Managed</div></div>
                            <div class="stat"><div class="stat-value">${admin.joinDate || '2024'}</div><div class="stat-label">Joined</div></div>
                            <div class="stat"><div class="stat-value">${admin.lastActive || 'Active'}</div><div class="stat-label">Active</div></div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="editAdmin('${admin.adminId}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteAdmin('${admin.adminId}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Search admins
        function searchAdmins() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAdmins.filter(a =>
                a.name.toLowerCase().includes(search) ||
                a.email.toLowerCase().includes(search) ||
                a.role.toLowerCase().includes(search)
            );
            const grid = document.getElementById('adminsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="text-align:center;padding:80px;background:rgba(0,0,0,0.6);border-radius:20px;"><i class="fas fa-search" style="font-size:4em;color:#4ade80;"></i><h3 style="margin-top:20px;color:white;">No matching admins found</h3></div>`;
            } else {
                grid.innerHTML = filtered.map(admin => `
                    <div class="admin-card">
                        <div class="card-header">
                            <div class="admin-avatar">
                                <img src="https://ui-avatars.com/api/?name=${admin.name}&background=667eea&color=fff&bold=true&size=100">
                                <div class="role-badge">${admin.role}</div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="admin-name">${admin.name}</div>
                            <div class="admin-info"><i class="fas fa-envelope"></i> ${admin.email}</div>
                            <div class="admin-info"><i class="fas fa-phone"></i> ${admin.phone || 'Not provided'}</div>
                            <div class="stats-row">
                                <div class="stat"><div class="stat-value">${admin.managedCustomers || 0}</div><div class="stat-label">Managed</div></div>
                                <div class="stat"><div class="stat-value">${admin.joinDate || '2024'}</div><div class="stat-label">Joined</div></div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-edit" onclick="editAdmin('${admin.adminId}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-delete" onclick="deleteAdmin('${admin.adminId}')"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Show add modal
        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerHTML = 'Add New Administrator';
            document.getElementById('adminName').value = '';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminRole').value = 'Admin';
            document.getElementById('adminPhone').value = '';
            document.getElementById('adminDepartment').value = '';
            document.getElementById('modal').style.display = 'flex';
        }

        // Edit admin
        async function editAdmin(adminId) {
            try {
                const response = await fetch(`/api/admins/${adminId}`);
                const data = await response.json();
                if (data.success && data.data) {
                    currentEditId = adminId;
                    document.getElementById('modalTitle').innerHTML = 'Edit Administrator';
                    document.getElementById('adminName').value = data.data.name;
                    document.getElementById('adminEmail').value = data.data.email;
                    document.getElementById('adminRole').value = data.data.role;
                    document.getElementById('adminPhone').value = data.data.phone || '';
                    document.getElementById('adminDepartment').value = data.data.department || '';
                    document.getElementById('modal').style.display = 'flex';
                }
            } catch (error) {
                showToast('Error loading admin', 'error');
            }
        }

        // Save admin to MongoDB
        async function saveAdmin() {
            const name = document.getElementById('adminName').value.trim();
            const email = document.getElementById('adminEmail').value.trim();

            if (!name || !email) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            const adminData = {
                adminId: currentEditId || `ADMIN${String(Date.now()).slice(-6)}`,
                name: name,
                email: email,
                role: document.getElementById('adminRole').value,
                phone: document.getElementById('adminPhone').value.trim(),
                department: document.getElementById('adminDepartment').value.trim(),
                joinDate: new Date().toISOString().split('T')[0],
                managedCustomers: 0,
                lastActive: new Date().toISOString().split('T')[0],
                status: 'Active'
            };

            try {
                let response;
                if (currentEditId) {
                    response = await fetch(`/api/admins/${currentEditId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(adminData)
                    });
                } else {
                    response = await fetch('/api/admins', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(adminData)
                    });
                }

                const result = await response.json();
                if (result.success) {
                    showToast(currentEditId ? 'Admin updated in database!' : 'Admin added to database!', 'success');
                    closeModal();
                    loadAdmins(); // Reload from database
                } else {
                    showToast(result.error || 'Error saving admin', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error saving admin', 'error');
            }
        }

        // Delete admin from MongoDB
        async function deleteAdmin(adminId) {
            if (confirm('⚠️ Are you sure you want to delete this administrator? This will be permanent!')) {
                try {
                    const response = await fetch(`/api/admins/${adminId}`, { method: 'DELETE' });
                    const result = await response.json();
                    if (result.success) {
                        showToast('Admin deleted from database!', 'success');
                        loadAdmins(); // Reload from database
                    } else {
                        showToast('Error deleting admin', 'error');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error deleting admin', 'error');
                }
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            toast.className = `toast ${type}`;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        window.onclick = function (event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) closeModal();
        }

        // Load admins on page load
        loadAdmins();
    </script>
</body>

</html>
