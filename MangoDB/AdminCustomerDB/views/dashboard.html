<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Customer Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Premium Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-add,
        .btn-back {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-add {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            margin-right: 10px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-add:hover,
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* Search Bar */
        .search-bar {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            animation: fadeInUp 0.6s ease;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Table */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.7s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
        }

        tr {
            transition: all 0.3s ease;
        }

        tr:hover {
            background: linear-gradient(90deg, #f8f9ff 0%, #ffffff 100%);
            transform: scale(1.01);
        }

        .btn-edit,
        .btn-delete {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .btn-edit {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }

        .btn-delete {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }

        .btn-edit:hover,
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 550px;
            max-width: 90%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            margin-bottom: 25px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* Membership Badge */
        .membership-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .search-bar {
                flex-direction: column;
            }

            table {
                display: block;
                overflow-x: auto;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-users"></i>
                Customer Management
            </h1>
            <div>
                <button class="btn-add" onclick="showAddModal()">
                    <i class="fas fa-plus"></i> Add Customer
                </button>
                <button class="btn-back" onclick="window.location.href='/'">
                    <i class="fas fa-home"></i> Back to Home
                </button>
            </div>
        </div>

        <div class="search-bar">
            <i class="fas fa-search" style="align-self: center; color: #667eea;"></i>
            <input type="text" id="searchInput" class="search-input"
                placeholder="Search by name, email, or customer ID..." onkeyup="searchCustomers()">
        </div>

        <div class="table-container">
            <table id="customersTable">
                <thead>
                    <tr>
                        <th>Customer ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Membership</th>
                        <th>Total Spent</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customersBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            <i class="fas fa-spinner fa-spin" style="font-size: 2em; color: #667eea;"></i>
                            <p>Loading customers...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>
                <i class="fas fa-user-plus"></i>
                <span id="modalTitle">Add Customer</span>
            </h2>
            <div class="form-group">
                <label>Customer ID:</label>
                <input type="text" id="customerId" placeholder="e.g., CUST004">
            </div>
            <div class="form-group">
                <label>First Name:</label>
                <input type="text" id="firstName" placeholder="First name">
            </div>
            <div class="form-group">
                <label>Last Name:</label>
                <input type="text" id="lastName" placeholder="Last name">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="form-group">
                <label>Phone:</label>
                <input type="text" id="phone" placeholder="Phone">
            </div>
            <div class="form-group">
                <label>Membership:</label>
                <select id="membership">
                    <option value="Silver">Silver</option>
                    <option value="Gold">Gold</option>
                    <option value="Platinum">Platinum</option>
                </select>
            </div>
            <div class="form-group">
                <label>Total Spent:</label>
                <input type="number" id="totalSpent" placeholder="0.00" step="0.01">
            </div>
            <div class="modal-buttons">
                <button class="btn-add" onclick="saveCustomer()">Save</button>
                <button class="btn-back" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditId = null;
        let allCustomers = [];

        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    allCustomers = data.data;
                    displayCustomers(allCustomers);
                } else {
                    document.getElementById('customersBody').innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 40px;">
                                <i class="fas fa-users" style="font-size: 3em; color: #ccc;"></i>
                                <p>No customers found</p>
                                <button class="btn-add" onclick="showAddModal()" style="margin-top: 10px;">Add your first customer</button>
                            </td>
                        </tr>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('customersBody').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #f44336;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3em;"></i>
                            <p>Error loading customers</p>
                        </td>
                    </tr>
                `;
            }
        }

        function displayCustomers(customers) {
            if (customers.length === 0) {
                document.getElementById('customersBody').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            <i class="fas fa-search" style="font-size: 3em; color: #ccc;"></i>
                            <p>No matching customers found</p>
                        </td>
                    </tr>
                `;
                return;
            }

            document.getElementById('customersBody').innerHTML = customers.map(customer => `
                <tr>
                    <td><strong>${customer.customerId}</strong></td>
                    <td><i class="fas fa-user-circle"></i> ${customer.firstName} ${customer.lastName}</td>
                    <td><i class="fas fa-envelope"></i> ${customer.email}</td>
                    <td><i class="fas fa-phone"></i> ${customer.phone || 'N/A'}</td>
                    <td>
                        <span class="membership-badge" style="background: ${getMembershipColor(customer.membership)}; color: ${customer.membership === 'Silver' ? '#333' : '#fff'}">
                            <i class="fas fa-trophy"></i> ${customer.membership}
                        </span>
                    </td>
                    <td><i class="fas fa-dollar-sign"></i> ${customer.totalSpent.toFixed(2)}</td>
                    <td>
                        <button class="btn-edit" onclick="editCustomer('${customer.customerId}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-delete" onclick="deleteCustomer('${customer.customerId}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function searchCustomers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCustomers.filter(customer =>
                customer.customerId.toLowerCase().includes(searchTerm) ||
                customer.firstName.toLowerCase().includes(searchTerm) ||
                customer.lastName.toLowerCase().includes(searchTerm) ||
                customer.email.toLowerCase().includes(searchTerm)
            );
            displayCustomers(filtered);
        }

        function getMembershipColor(membership) {
            switch (membership) {
                case 'Platinum': return 'linear-gradient(135deg, #FFD700, #FFA500)';
                case 'Gold': return 'linear-gradient(135deg, #FFC107, #FF9800)';
                default: return 'linear-gradient(135deg, #e0e0e0, #C0C0C0)';
            }
        }

        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Add Customer';
            document.getElementById('customerId').value = '';
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('membership').value = 'Silver';
            document.getElementById('totalSpent').value = '0';
            document.getElementById('modal').style.display = 'flex';
        }

        async function editCustomer(customerId) {
            try {
                const response = await fetch(`/api/customers/${customerId}`);
                const data = await response.json();

                if (data.success && data.data) {
                    currentEditId = customerId;
                    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit Customer';
                    document.getElementById('customerId').value = data.data.customerId;
                    document.getElementById('firstName').value = data.data.firstName;
                    document.getElementById('lastName').value = data.data.lastName;
                    document.getElementById('email').value = data.data.email;
                    document.getElementById('phone').value = data.data.phone || '';
                    document.getElementById('membership').value = data.data.membership;
                    document.getElementById('totalSpent').value = data.data.totalSpent;
                    document.getElementById('modal').style.display = 'flex';
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error loading customer data', 'error');
            }
        }

        async function saveCustomer() {
            const customerData = {
                customerId: document.getElementById('customerId').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                membership: document.getElementById('membership').value,
                totalSpent: parseFloat(document.getElementById('totalSpent').value),
                createdAt: new Date().toISOString().split('T')[0]
            };

            if (!customerData.customerId || !customerData.firstName || !customerData.lastName || !customerData.email) {
                showNotification('Please fill all required fields', 'error');
                return;
            }

            try {
                let response;
                if (currentEditId) {
                    response = await fetch(`/api/customers/${currentEditId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(customerData)
                    });
                } else {
                    response = await fetch('/api/customers', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(customerData)
                    });
                }

                const result = await response.json();
                if (result.success) {
                    showNotification(currentEditId ? 'Customer updated successfully!' : 'Customer added successfully!', 'success');
                    closeModal();
                    loadCustomers();
                } else {
                    showNotification('Error saving customer', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error saving customer', 'error');
            }
        }

        async function deleteCustomer(customerId) {
            if (confirm('Are you sure you want to delete this customer?')) {
                try {
                    const response = await fetch(`/api/customers/${customerId}`, { method: 'DELETE' });
                    const result = await response.json();
                    if (result.success) {
                        showNotification('Customer deleted successfully!', 'success');
                        loadCustomers();
                    } else {
                        showNotification('Error deleting customer', 'error');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showNotification('Error deleting customer', 'error');
                }
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? '#4CAF50' : '#f44336'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                z-index: 1001;
                animation: slideInRight 0.3s ease;
                font-weight: 500;
            `;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Close modal on escape key
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        loadCustomers();
    </script>
</body>

</html>
