<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management - ProPanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1e;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
        }

        .main-content {
            margin-top: 80px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .top-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-title h1 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-export {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 0, 0, 0.7);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-header h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
            font-weight: 600;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 22px;
            color: #a9b4ff;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
        }

        .filters-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .filters-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex: 2;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .search-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.95em;
            color: white;
        }

        .filter-wrapper {
            flex: 1;
            position: relative;
        }

        .filter-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-wrapper select {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .customer-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .customer-card:hover {
            transform: translateY(-8px);
            background: rgba(0, 0, 0, 0.7);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .customer-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .membership-badge {
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .card-body {
            padding: 20px;
        }

        .customer-name {
            font-size: 1.3em;
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
        }

        .customer-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: 800;
            color: #a9b4ff;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.8);
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.8);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            width: 550px;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close {
            cursor: pointer;
            font-size: 1.8em;
            transition: all 0.3s;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
        }

        .modal-footer {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            z-index: 2100;
            color: white;
        }

        .toast.success {
            border-left: 4px solid #4ade80;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .customers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <div class="logo-text">
                    <h1>ProPanel</h1>
                    <p>Enterprise Suite</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/customers" class="active">Customers</a>
                <a href="/admins">Admins</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Customer Management</h1>
                <p>Manage your customers - Changes are saved to MongoDB</p>
            </div>
            <div class="action-buttons">
                <button class="btn-export" onclick="exportData()"><i class="fas fa-download"></i> Export CSV</button>
                <button class="btn-add" onclick="showAddModal()"><i class="fas fa-plus"></i> New Customer</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="filters-section">
            <div class="filters-row">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search customers..." onkeyup="filterCustomers()">
                </div>
                <div class="filter-wrapper">
                    <i class="fas fa-trophy"></i>
                    <select id="membershipFilter" onchange="filterCustomers()">
                        <option value="">All Memberships</option>
                        <option value="Silver">Silver</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="customersGrid" class="customers-grid">
            <div class="loading-spinner" style="text-align:center;padding:60px;color:white;">Loading customers from
                MongoDB...</div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Customer</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" placeholder="Enter first name">
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="lastName" placeholder="Enter last name">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="customer@example.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone" placeholder="+1 (555) 123-4567">
                </div>
                <div class="form-group">
                    <label>Membership</label>
                    <select id="membership">
                        <option value="Silver">Silver</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Total Spent ($)</label>
                    <input type="number" id="totalSpent" placeholder="0.00" step="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveCustomer()">Save to MongoDB</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let allCustomers = [];
        let currentEditId = null;

        // Load customers from MongoDB API
        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                const data = await response.json();
                if (data.success) {
                    allCustomers = data.data;
                    updateStats();
                    displayCustomers();
                    showToast(`Loaded ${allCustomers.length} customers from MongoDB`, 'success');
                } else {
                    showToast('Failed to load customers', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error connecting to MongoDB', 'error');
                document.getElementById('customersGrid').innerHTML = '<div style="text-align:center;padding:60px;color:white;">❌ Failed to connect to MongoDB. Make sure server is running.</div>';
            }
        }

        // Update statistics
        function updateStats() {
            const total = allCustomers.length;
            const totalRevenue = allCustomers.reduce((sum, c) => sum + (c.totalSpent || 0), 0);
            const avgSpending = total > 0 ? totalRevenue / total : 0;
            const goldMembers = allCustomers.filter(c => c.membership === 'Gold').length;

            const statsHtml = `
                <div class="stat-card"><div class="stat-header"><h4>Total Customers</h4><div class="stat-icon"><i class="fas fa-users"></i></div></div><div class="stat-number">${total}</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Total Revenue</h4><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div></div><div class="stat-number">$${totalRevenue.toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Average Value</h4><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div><div class="stat-number">$${avgSpending.toFixed(2)}</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Gold Members</h4><div class="stat-icon"><i class="fas fa-crown"></i></div></div><div class="stat-number">${goldMembers}</div></div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;
        }

        // Display customers
        function displayCustomers() {
            const grid = document.getElementById('customersGrid');
            let filtered = [...allCustomers];

            const search = document.getElementById('searchInput').value.toLowerCase();
            const membership = document.getElementById('membershipFilter').value;

            if (search) {
                filtered = filtered.filter(c =>
                    c.firstName.toLowerCase().includes(search) ||
                    c.lastName.toLowerCase().includes(search) ||
                    c.email.toLowerCase().includes(search)
                );
            }
            if (membership) {
                filtered = filtered.filter(c => c.membership === membership);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="text-align:center;padding:80px;background:rgba(0,0,0,0.6);border-radius:20px;color:white;">No customers found</div>`;
                return;
            }

            grid.innerHTML = filtered.map(customer => `
                <div class="customer-card">
                    <div class="card-header">
                        <div class="customer-avatar">
                            <img src="https://ui-avatars.com/api/?name=${customer.firstName}+${customer.lastName}&background=667eea&color=fff&size=80">
                        </div>
                        <div class="membership-badge">${customer.membership}</div>
                    </div>
                    <div class="card-body">
                        <div class="customer-name">${customer.firstName} ${customer.lastName}</div>
                        <div class="customer-info"><i class="fas fa-envelope"></i> ${customer.email}</div>
                        <div class="customer-info"><i class="fas fa-phone"></i> ${customer.phone || 'Not provided'}</div>
                        <div class="stats-row">
                            <div class="stat"><div class="stat-value">$${customer.totalSpent.toFixed(2)}</div><div class="stat-label">Spent</div></div>
                            <div class="stat"><div class="stat-value">${customer.orders || 0}</div><div class="stat-label">Orders</div></div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="editCustomer('${customer.customerId}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteCustomer('${customer.customerId}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function filterCustomers() {
            displayCustomers();
        }

        // Generate new customer ID
        function generateCustomerId() {
            const maxId = allCustomers.reduce((max, c) => {
                const num = parseInt(c.customerId.replace('CUST', ''));
                return num > max ? num : max;
            }, 0);
            return `CUST${String(maxId + 1).padStart(3, '0')}`;
        }

        // Show add modal
        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerHTML = 'Add New Customer';
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('membership').value = 'Silver';
            document.getElementById('totalSpent').value = '0';
            document.getElementById('modal').style.display = 'flex';
        }

        // Edit customer
        async function editCustomer(customerId) {
            try {
                const response = await fetch(`/api/customers/${customerId}`);
                const data = await response.json();
                if (data.success) {
                    currentEditId = customerId;
                    document.getElementById('modalTitle').innerHTML = 'Edit Customer';
                    document.getElementById('firstName').value = data.data.firstName;
                    document.getElementById('lastName').value = data.data.lastName;
                    document.getElementById('email').value = data.data.email;
                    document.getElementById('phone').value = data.data.phone || '';
                    document.getElementById('membership').value = data.data.membership;
                    document.getElementById('totalSpent').value = data.data.totalSpent;
                    document.getElementById('modal').style.display = 'flex';
                }
            } catch (error) {
                showToast('Error loading customer', 'error');
            }
        }

        // Save customer to MongoDB
        async function saveCustomer() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!firstName || !lastName || !email) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            const customerData = {
                customerId: currentEditId || generateCustomerId(),
                firstName: firstName,
                lastName: lastName,
                email: email,
                phone: document.getElementById('phone').value.trim(),
                membership: document.getElementById('membership').value,
                totalSpent: parseFloat(document.getElementById('totalSpent').value) || 0,
                orders: Math.floor(Math.random() * 30) + 1,
                joinDate: new Date().toISOString().split('T')[0],
                lastActive: new Date().toISOString().split('T')[0]
            };

            try {
                let response;
                if (currentEditId) {
                    response = await fetch(`/api/customers/${currentEditId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(customerData)
                    });
                } else {
                    response = await fetch('/api/customers', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(customerData)
                    });
                }

                const result = await response.json();
                if (result.success) {
                    showToast(currentEditId ? 'Customer updated in MongoDB!' : 'Customer added to MongoDB!', 'success');
                    closeModal();
                    loadCustomers(); // Reload from database
                } else {
                    showToast(result.error || 'Error saving customer', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error saving to MongoDB', 'error');
            }
        }

        // Delete customer from MongoDB
        async function deleteCustomer(customerId) {
            if (confirm('⚠️ Delete this customer from MongoDB? This action cannot be undone.')) {
                try {
                    const response = await fetch(`/api/customers/${customerId}`, { method: 'DELETE' });
                    const result = await response.json();
                    if (result.success) {
                        showToast('Customer deleted from MongoDB!', 'success');
                        loadCustomers(); // Reload from database
                    } else {
                        showToast('Error deleting customer', 'error');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error deleting from MongoDB', 'error');
                }
            }
        }

        // Export to CSV
        function exportData() {
            const headers = ['ID', 'First Name', 'Last Name', 'Email', 'Phone', 'Membership', 'Total Spent'];
            const rows = allCustomers.map(c => [c.customerId, c.firstName, c.lastName, c.email, c.phone || '', c.membership, c.totalSpent]);
            const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            showToast('Export successful!', 'success');
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            toast.className = `toast ${type}`;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        window.onclick = function (event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) closeModal();
        }

        // Load customers on page load
        loadCustomers();
    </script>
</body>

</html>
