<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management - ProPanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1e;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-title h1 {
            font-size: 1.8em;
            color: white;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-export {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-export:hover {
            background: rgba(74, 222, 128, 0.3);
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-header h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 22px;
            color: #a9b4ff;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 0.8em;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Filters Section */
        .filters-section {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filters-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex: 2;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .search-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.95em;
            color: white;
            transition: all 0.3s;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-wrapper {
            flex: 1;
            position: relative;
        }

        .filter-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .filter-wrapper select {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.95em;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-wrapper select option {
            background: #1e293b;
        }

        .filter-wrapper select:focus {
            outline: none;
            border-color: #667eea;
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 12px;
        }

        .view-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.7);
        }

        .view-btn.active {
            background: rgba(102, 126, 234, 0.3);
            color: white;
        }

        /* Customers Grid */
        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .customer-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .customer-card:hover {
            transform: translateY(-8px);
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .card-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1;
        }

        .trending-badge {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .customer-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .membership-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .card-body {
            padding: 20px;
        }

        .customer-name {
            font-size: 1.3em;
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .customer-rating {
            color: #fbbf24;
            font-size: 0.9em;
        }

        .customer-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .customer-info i {
            width: 20px;
            color: #a9b4ff;
        }

        .progress-section {
            margin: 20px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 1s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: 800;
            color: #a9b4ff;
        }

        .stat-label {
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.8);
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.8);
            color: white;
        }

        .btn-edit:hover,
        .btn-delete:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Table View */
        .table-view {
            display: none;
            overflow-x: auto;
        }

        .table-view.active {
            display: block;
        }

        .customers-table {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .customers-table th {
            background: rgba(102, 126, 234, 0.3);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .customers-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        .customers-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            width: 550px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.5em;
            font-weight: 700;
        }

        .close {
            cursor: pointer;
            font-size: 1.8em;
            transition: all 0.3s;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: white;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.95em;
            color: white;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .modal-footer {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save:hover,
        .btn-cancel:hover {
            transform: translateY(-2px);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 2100;
            border-left: 4px solid;
            color: white;
        }

        .toast.success {
            border-left-color: #4ade80;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .customers-grid {
                grid-template-columns: 1fr;
            }

            .filters-row {
                flex-direction: column;
            }

            .main-content {
                padding: 1rem;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="logo-text">
                    <h1>ProPanel</h1>
                    <p>Enterprise Suite</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/customers" class="active">Customers</a>
                <a href="/admins">Admins</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Customer Management</h1>
                <p>Manage your customers, track performance, and grow your business</p>
            </div>
            <div class="action-buttons">
                <button class="btn-export" onclick="exportData()">
                    <i class="fas fa-download"></i> Export CSV
                </button>
                <button class="btn-add" onclick="showAddModal()">
                    <i class="fas fa-plus"></i> New Customer
                </button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="filters-section">
            <div class="filters-row">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, email, phone, or ID..."
                        onkeyup="debouncedSearch()">
                </div>
                <div class="filter-wrapper">
                    <i class="fas fa-trophy"></i>
                    <select id="membershipFilter" onchange="filterCustomers()">
                        <option value="">All Memberships</option>
                        <option value="Silver">Silver Member</option>
                        <option value="Gold">Gold Member</option>
                        <option value="Platinum">Platinum Member</option>
                    </select>
                </div>
                <div class="filter-wrapper">
                    <i class="fas fa-sort"></i>
                    <select id="sortBy" onchange="sortCustomers()">
                        <option value="name">Sort by Name (A-Z)</option>
                        <option value="name-desc">Sort by Name (Z-A)</option>
                        <option value="spent">Sort by Spending (High-Low)</option>
                        <option value="spent-asc">Sort by Spending (Low-High)</option>
                    </select>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" onclick="toggleView('grid')" id="gridViewBtn">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button class="view-btn" onclick="toggleView('table')" id="tableViewBtn">
                        <i class="fas fa-table"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="gridView" class="customers-grid">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading customer data...</p>
            </div>
        </div>

        <div id="tableView" class="table-view">
            <table class="customers-table">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Contact</th>
                        <th>Membership</th>
                        <th>Total Spent</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Customer</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" placeholder="Enter first name">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" placeholder="Enter last name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="customer@example.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone" placeholder="+1 (234) 567-8900">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Membership</label>
                        <select id="membership">
                            <option value="Silver">Silver</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Total Spent ($)</label>
                        <input type="number" id="totalSpent" placeholder="0.00" step="0.01">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveCustomer()">Save Customer</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let allCustomers = [];
        let currentEditId = null;
        let searchTimeout;

        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                const data = await response.json();
                if (data.success) {
                    allCustomers = data.data;
                    updateStats();
                    filterCustomers();
                }
            } catch (error) {
                showToast('Failed to load customers', 'error');
            }
        }

        function updateStats() {
            const total = allCustomers.length;
            const totalRevenue = allCustomers.reduce((sum, c) => sum + (c.totalSpent || 0), 0);
            const avgSpending = total > 0 ? totalRevenue / total : 0;
            const goldMembers = allCustomers.filter(c => c.membership === 'Gold').length;

            const statsHtml = `
                <div class="stat-card"><div class="stat-header"><h4>Total Customers</h4><div class="stat-icon"><i class="fas fa-users"></i></div></div><div class="stat-number">${total}</div><div class="stat-change"><i class="fas fa-chart-line"></i> Active</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Total Revenue</h4><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div></div><div class="stat-number">$${totalRevenue.toLocaleString()}</div><div class="stat-change"><i class="fas fa-arrow-up"></i> Lifetime</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Average Value</h4><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div><div class="stat-number">$${avgSpending.toFixed(2)}</div><div class="stat-change"><i class="fas fa-arrow-up"></i> Per customer</div></div>
                <div class="stat-card"><div class="stat-header"><h4>Gold Members</h4><div class="stat-icon"><i class="fas fa-crown"></i></div></div><div class="stat-number">${goldMembers}</div><div class="stat-change"><i class="fas fa-star"></i> Premium</div></div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;
        }

        function displayGrid(customers) {
            const grid = document.getElementById('gridView');
            if (customers.length === 0) {
                grid.innerHTML = `<div style="text-align:center;padding:80px;background:rgba(0,0,0,0.6);border-radius:20px;"><i class="fas fa-users-slash" style="font-size:4em;color:#4ade80;"></i><h3 style="margin-top:20px;color:white;">No customers found</h3><button class="btn-add" style="margin-top:20px;" onclick="showAddModal()">Add Customer</button></div>`;
                return;
            }
            grid.innerHTML = customers.map(c => `<div class="customer-card"><div class="card-header"><div class="customer-avatar"><img src="https://ui-avatars.com/api/?name=${c.firstName}+${c.lastName}&background=667eea&color=fff&size=80"></div><div class="membership-badge">${c.membership}</div></div><div class="card-body"><div class="customer-name">${c.firstName} ${c.lastName}<div class="customer-rating">★★★★☆</div></div><div class="customer-info"><i class="fas fa-envelope"></i> ${c.email}</div><div class="customer-info"><i class="fas fa-phone"></i> ${c.phone || 'Not provided'}</div><div class="stats-row"><div class="stat"><div class="stat-value">$${c.totalSpent.toFixed(2)}</div><div class="stat-label">Spent</div></div><div class="stat"><div class="stat-value">${c.orders || 0}</div><div class="stat-label">Orders</div></div></div></div><div class="card-actions"><button class="btn-edit" onclick="editCustomer('${c.customerId}')"><i class="fas fa-edit"></i> Edit</button><button class="btn-delete" onclick="deleteCustomer('${c.customerId}')"><i class="fas fa-trash"></i> Delete</button></div></div>`).join('');
        }

        function displayTable(customers) {
            const tbody = document.getElementById('tableBody');
            if (customers.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:60px;">No customers found</td></tr>'; return; }
            tbody.innerHTML = customers.map(c => `<tr><td><div style="display:flex;align-items:center;gap:12px;"><img src="https://ui-avatars.com/api/?name=${c.firstName}+${c.lastName}&background=667eea&color=fff&size=40" style="width:40px;height:40px;border-radius:50%;"><div><strong>${c.firstName} ${c.lastName}</strong><br><small>${c.customerId}</small></div></div></td><td>${c.email}<br><small>${c.phone || 'No phone'}</small></td><td>${c.membership}</td><td>$${c.totalSpent.toFixed(2)}</td><td><button class="btn-edit" onclick="editCustomer('${c.customerId}')" style="padding:6px 12px;"><i class="fas fa-edit"></i></button> <button class="btn-delete" onclick="deleteCustomer('${c.customerId}')" style="padding:6px 12px;"><i class="fas fa-trash"></i></button></td></tr>`).join('');
        }

        function filterCustomers() {
            let filtered = [...allCustomers];
            const search = document.getElementById('searchInput').value.toLowerCase();
            const membership = document.getElementById('membershipFilter').value;
            if (search) filtered = filtered.filter(c => c.firstName.toLowerCase().includes(search) || c.lastName.toLowerCase().includes(search) || c.email.toLowerCase().includes(search));
            if (membership) filtered = filtered.filter(c => c.membership === membership);
            const isGrid = document.getElementById('gridView').style.display !== 'none';
            isGrid ? displayGrid(filtered) : displayTable(filtered);
        }

        function sortCustomers() {
            const sortBy = document.getElementById('sortBy').value;
            allCustomers.sort((a, b) => sortBy === 'name' ? `${a.firstName} ${a.lastName}`.localeCompare(`${b.firstName} ${b.lastName}`) : sortBy === 'name-desc' ? `${b.firstName} ${b.lastName}`.localeCompare(`${a.firstName} ${a.lastName}`) : sortBy === 'spent' ? b.totalSpent - a.totalSpent : a.totalSpent - b.totalSpent);
            filterCustomers();
        }

        function debouncedSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(filterCustomers, 300); }
        function toggleView(view) { document.getElementById('gridView').style.display = view === 'grid' ? 'grid' : 'none'; document.getElementById('tableView').classList.toggle('active', view === 'table'); document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid'); document.getElementById('tableViewBtn').classList.toggle('active', view === 'table'); filterCustomers(); }
        function exportData() { const headers = ['ID', 'First', 'Last', 'Email', 'Phone', 'Membership', 'Total Spent']; const rows = allCustomers.map(c => [c.customerId, c.firstName, c.lastName, c.email, c.phone || '', c.membership, c.totalSpent]); const csv = [headers, ...rows].map(row => row.join(',')).join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`; a.click(); showToast('Export successful!', 'success'); }
        function showAddModal() { currentEditId = null; document.getElementById('modalTitle').innerHTML = 'Add New Customer'; document.getElementById('firstName').value = ''; document.getElementById('lastName').value = ''; document.getElementById('email').value = ''; document.getElementById('phone').value = ''; document.getElementById('membership').value = 'Silver'; document.getElementById('totalSpent').value = '0'; document.getElementById('modal').style.display = 'flex'; }
        async function editCustomer(id) { try { const res = await fetch(`/api/customers/${id}`); const data = await res.json(); if (data.success) { currentEditId = id; document.getElementById('modalTitle').innerHTML = 'Edit Customer'; document.getElementById('firstName').value = data.data.firstName; document.getElementById('lastName').value = data.data.lastName; document.getElementById('email').value = data.data.email; document.getElementById('phone').value = data.data.phone || ''; document.getElementById('membership').value = data.data.membership; document.getElementById('totalSpent').value = data.data.totalSpent; document.getElementById('modal').style.display = 'flex'; } } catch (e) { showToast('Error loading customer', 'error'); } }
        async function saveCustomer() { const data = { customerId: currentEditId || `CUST${String(allCustomers.length + 1).padStart(3, '0')}`, firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, membership: document.getElementById('membership').value, totalSpent: parseFloat(document.getElementById('totalSpent').value) || 0 }; if (!data.firstName || !data.lastName || !data.email) { showToast('Please fill required fields', 'error'); return; } try { const url = currentEditId ? `/api/customers/${currentEditId}` : '/api/customers'; const method = currentEditId ? 'PUT' : 'POST'; const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); const result = await res.json(); if (result.success) { showToast(currentEditId ? 'Customer updated!' : 'Customer added!', 'success'); closeModal(); loadCustomers(); } } catch (e) { showToast('Error saving customer', 'error'); } }
        async function deleteCustomer(id) { if (confirm('Delete this customer?')) { try { const res = await fetch(`/api/customers/${id}`, { method: 'DELETE' }); if ((await res.json()).success) { showToast('Customer deleted!', 'success'); loadCustomers(); } } catch (e) { showToast('Error deleting customer', 'error'); } } }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showToast(msg, type) { const toast = document.getElementById('toast'); toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`; toast.className = `toast ${type}`; toast.style.display = 'flex'; setTimeout(() => toast.style.display = 'none', 3000); }
        window.onclick = e => { if (e.target === document.getElementById('modal')) closeModal(); };
        loadCustomers();
    </script>
</body>

</html>
